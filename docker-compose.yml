services:
  backend:
    build: ./backend
    environment:
      APP_DATABASE_URL: sqlite+aiosqlite:///./data/app.db
      APP_JWT_SECRET: ${APP_JWT_SECRET:-dev-only-insecure-secret-change-me-in-production}
      APP_CORS_ORIGINS: '["http://localhost:5173"]'
    volumes:
      - backend-data:/app/data
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  backend-data:
